plugins {
    id 'com.android.application'
}

android {
    namespace 'com.virtual_drm.consumer'
    compileSdk 36

    defaultConfig {
        applicationId "com.virtual_drm.consumer"
        minSdk 30
        targetSdk 36
        versionCode 1
        versionName "1.0"

        ndk {
            abiFilters 'arm64-v8a'
        }

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=none"
            }
        }
    }

    ndkVersion "29.0.13113456"

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
